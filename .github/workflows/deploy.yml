name: Build & Deploy

on:
  push:
    branches:
      - master

jobs:
  docker:
    name: Build and Push Container
    runs-on: ubuntu-latest
    if: github.repository == 'scout-ch/thilo'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          tags: ghcr.io/scout-ch/thilo/thilo_frontend:latest

  gh-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm astro build --base /thilo/
        env:
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/thilo', github.repository_owner) }}
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build

  production:
    name: Deploy to Production (FTP)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.repository == 'scout-ch/thilo'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm astro build
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SITE_URL: https://thilo.scouts.ch
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: /webroot/ROOT/
          local-dir: ./build/
          exclude: |
            **/.devcontainer*
            **/.devcontainer*/**
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
